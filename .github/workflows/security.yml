name: Security checks

on:
  pull_request:
    paths:
      - '**.sql'
      - '**.js'
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - '**.sql'
      - '**.js'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SQL and frontend exposure
        run: node scripts/security_lint.mjs

  supabase-advisors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Supabase security advisors
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: sulwxicoqpvvxvowqfhz
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN is not configured; remote advisor check skipped."
            exit 0
          fi
          node scripts/check_supabase_advisors.mjs
